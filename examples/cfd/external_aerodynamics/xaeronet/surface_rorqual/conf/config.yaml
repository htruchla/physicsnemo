hydra:
  job:
    chdir: true
    name: XAeroNetS_2026_03_11
  run:
    dir: /lustre10/scratch/htruchla/XAERONET/outputs/full_runs/${hydra:job.name}

# ┌───────────────────────────────────────────┐
# │            Data Preprocessing             │
# └───────────────────────────────────────────┘

num_nodes: [100000, 200000, 400000]                  # Number of nodes in the graphs
node_degree: 6                                       # Degree of the nodes in the graphs
num_partitions: 3                                    # Number of partitions for each graph
data_path:  /lustre10/scratch/htruchla/XAERONET/XAERONET_raw_files      # Path to the raw data
num_preprocess_workers: 32                           # Number of workers for data preprocessing
save_point_clouds: false                             # Save point clouds for the preprocessed data

# ┌───────────────────────────────────────────┐
# │           Model Configuration             │
# └───────────────────────────────────────────┘

num_message_passing_layers: 15 # 9 for debugging                       # Number of message passing layers, needs to  be divisible by checkpoint_segments, controls how manu rounds of message passing the GNN performs 
hidden_dim: 512 # changed to 64 for debugging                                      # Hidden dimension of the model
activation: silu                                     # Activation function

# ┌───────────────────────────────────────────┐
# │          Training Configuration           │
# └───────────────────────────────────────────┘

partitions_path: /lustre10/scratch/htruchla/XAERONET/partitions_training                         # Path to the partitions (.bin files)
validation_partitions_path: /lustre10/scratch/htruchla/XAERONET/partitions_val  # Path to the validation partitions (.bin files)
test_partitions_path: /lustre10/scratch/htruchla/XAERONET/partitions_test           # Path to the test partitions (.bin files)
stats_file: global_stats.json                       # Path to the global statistics (.json file)
checkpoint_filename: model_checkpoint #removed .pth bc the train_rorqual.py script takes care of it            # Filename of the model checkpoint
num_epochs: 2000 # changed to 10CHANGED FOR DEBUGGING                              # Number of epochs
start_lr: 0.001                                     # Initial learning rate (cos annealing schedule is used)
end_lr: 0.000001                                    # Final learning rate (cos annealing schedule is used)
save_checkpoint_freq: 1                             # Frequency of saving the model checkpoint
validation_freq: 50                                 # Frequency of validation

# ┌───────────────────────────────────────────┐
# │        Performance Optimization           │
# └───────────────────────────────────────────┘

use_concat_trick: true                              # Use the concatenation trick
checkpoint_segments: 3                              # Number of segments for the activation checkpointing, during backprop, activations for each segment are recomputed on the fly rather than stored traiding compute time for memory
enable_cudnn_benchmark: true                        # Enable cudnn benchmark
